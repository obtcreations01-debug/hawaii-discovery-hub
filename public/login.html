<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in â Hawaii Discovery Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main id="main-content">
    <div class="auth-container">
      <h1>Log in</h1>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" />
        </div>
        <button class="btn btn-primary btn-lg" type="submit" style="width:100%;">Sign in</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="/register.html">Create one</a></p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/js/api.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/partials.js"></script>
  <script>
    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await api.login(email, password);
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Login failed', 'error'); return; }
        api.setToken(data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Welcome back!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 600);
      } catch (e) {
        showToast('Network error', 'error');
      }
    }
  </script>
</body>
</html>
